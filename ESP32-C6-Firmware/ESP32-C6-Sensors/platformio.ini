[env:esp32c6_sensors]
platform = espressif32
board = esp32-c6-devkitm-1
framework = arduino
monitor_speed = 115200
upload_port = /dev/ttyUSB0
lib_deps =
    Adafruit Unified Sensor
    Adafruit BusIO
    Adafruit ENS160
    Adafruit AHTX0
    PubSubClient
    ArduinoJson
build_flags = 
    -D SENSOR_MODULE
