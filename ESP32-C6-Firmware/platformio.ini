; **PlatformIO Configuration for ESP32-C6 Modules**

; Each ESP32-C6 module has its own environment to ensure the correct firmware is compiled and uploaded.

[platformio]
default_envs = esp32c6_relays

; **ESP32-C6-Relays Configuration**
[env:esp32c6_relays]
platform = espressif32
board = esp32-c6-devkitm-1
framework = arduino
monitor_speed = 115200
upload_port = /dev/ttyUSB0
lib_deps =
    PubSubClient
    ArduinoJson
    BLEPeripheral
    WiFi
    EEPROM
build_flags = 
    -D RELAY_MODULE

; **ESP32-C6-Sensors Configuration**
[env:esp32c6_sensors]
platform = espressif32
board = esp32-c6-devkitm-1
framework = arduino
monitor_speed = 115200
upload_port = /dev/ttyUSB0
lib_deps =
    Adafruit Unified Sensor
    Adafruit BusIO
    Adafruit ENS160
    Adafruit AHTX0
    PubSubClient
    ArduinoJson
build_flags = 
    -D SENSOR_MODULE

; **ESP32-C6-SoilLux Configuration**
[env:esp32c6_soillux]
platform = espressif32
board = esp32-c6-devkitm-1
framework = arduino
monitor_speed = 115200
upload_port = /dev/ttyUSB0
lib_deps =
    Adafruit Unified Sensor
    Adafruit BusIO
    Adafruit TSL2591
    PubSubClient
    ArduinoJson
build_flags = 
    -D SOIL_LUX_MODULE
