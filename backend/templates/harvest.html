{% extends 'base.html' %}

{% block content %}
<main>
    <div class="main-content">
        <h1>Harvest Plant</h1>
        <form method="post" action="{{ url_for('submit_harvest', plant_id=plant.id) }}" enctype="multipart/form-data">
            <label for="harvest_weight">Harvest Weight (kg):</label>
            <input type="number" id="harvest_weight" name="harvest_weight" step="0.01" required>

            <label for="photo">Upload Photo:</label>
            <input type="file" id="photo" name="photo" accept="image/*">

            <button type="submit">Submit Harvest</button>
        </form>
    </div>
</main>
{% endblock %}
