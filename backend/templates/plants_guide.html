{% extends 'base.html' %}

{% block content %}
<div class="main-content">
<h1>Grow Tent Guide</h1>
    
<div class="plant-list">
    <h3>Select a Plant:</h3>
    {% for plant in plants %}
    <button onclick="showPlantDetails('{{ plant.name }}')">{{ plant.name }}</button>
    {% endfor %}
</div>

<div class="table-container" id="table-container">
    <h2 id="plant-name"></h2>
    <table>
        <thead>
            <tr>
                <th>Growth Stage</th>
                <th>Time</th>
            </tr>
        </thead>
        <tbody id="growth-stages"></tbody>
    </table>
    <p><strong>Ideal Temperature:</strong> <span id="temperature"></span></p>
    <p><strong>Ideal Humidity:</strong> <span id="humidity"></span></p>
    <p><strong>Lighting:</strong> <span id="lighting"></span></p>
    <p><strong>Special Tips:</strong> <span id="tips"></span></p>
</div>
</div>


<script>
    const plantsData = {{ plants|tojson }};
    
    function showPlantDetails(plantName) {
        const plant = plantsData.find(p => p.name === plantName);
        
        if (plant) {
            document.getElementById('plant-name').innerText = plant.name;
            document.getElementById('temperature').innerText = plant.temperature;
            document.getElementById('humidity').innerText = plant.humidity;
            document.getElementById('lighting').innerText = plant.lighting;
            document.getElementById('tips').innerText = plant.tips;
            
            const growthStagesContainer = document.getElementById('growth-stages');
            growthStagesContainer.innerHTML = '';
            
            plant.growth_stages.forEach(stage => {
                const row = document.createElement('tr');
                const stageCell = document.createElement('td');
                const timeCell = document.createElement('td');
                
                stageCell.innerText = stage.stage;
                timeCell.innerText = stage.time;
                
                row.appendChild(stageCell);
                row.appendChild(timeCell);
                growthStagesContainer.appendChild(row);
            });
            
            document.getElementById('table-container').style.display = 'block';
        }
    }
</script>

{% endblock %}
