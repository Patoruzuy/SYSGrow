{% extends 'base.html' %}

{% block content %}
<h2>Light Schedule</h2>
<form method="post" action="{{ url_for('schedule_lights') }}">
    <div class="form-container">
        <div class="form-group">
            <input type="time" id="start_time" name="start_time" value="{{ light_schedule['start_time'] }}">
            <label for="start_time">Start Time</label>
        </div>
        <div class="form-group">
            <input type="time" id="end_time" name="end_time" value="{{ light_schedule['end_time'] }}">
            <label for="end_time">End Time</label>
        </div>
    </div>
    <button type="submit">Set Schedule</button>
</form>

<h2>Threshold Settings</h2>
<form method="post" action="{{ url_for('set_thresholds') }}">
    <div class="form-row">
        <label for="temperature_threshold">Temperature Threshold (°C): </label>
        <input type="number" id="temperature_threshold" name="temperature_threshold" step="0.1" required>
    </div>
    <div class="form-row">
        <label for="humidity_threshold">Humidity Threshold (%): </label>
        <input type="number" id="humidity_threshold" name="humidity_threshold" step="0.1" required>
    </div>
    <div class="form-row">
        <label for="soil_moisture_threshold">Soil Moisture Threshold: </label>
        <input type="number" id="soil_moisture_threshold" name="soil_moisture_threshold" step="0.1" required>
    </div>
    <div class="form-row">
        <button type="submit" class="submitbtn">Set Thresholds</button>
    </div>
</form>

<h2>Hotspot Settings</h2>
<fieldset class="Hotspot">
    <label class="switch">
        Hotspot
        <input type="checkbox" id="hotspot_toggle" onchange="toggleHotspotForm()">
        <span class="slider round"></span>
    </label>
    <form id="Hotspot-form" style="display: none;" action="/settings" method="POST">
        <label for="ssid">SSID:</label>
        <input type="text" id="ssid" name="ssid" value="{{ ssid }}" required><br><br>

        <label for="password">Password:</label>
        <input type="password" id="password" name="password" value="{{ password }}" required><br><br>

        <button type="submit">Save Settings</button>
    </form>
</fieldset>

<fieldset>
    <h2>Camera Settings</h2>
    <form method="post" action="{{ url_for('set_camera') }}">
        <label for="camera_type">Camera Type</label>
        <select id="camera_type" name="camera_type" onchange="toggleCameraFields()">
            <option value="esp32">ESP32 Wireless</option>
            <option value="usb">USB Camera</option>
        </select><br><br>

        <!-- ESP32 IP address input -->
        <div id="ip_address_field" style="display: none;">
            <label for="ip_address">ESP32 IP Address</label>
            <input type="text" id="ip_address" name="ip_address" placeholder="192.168.x.x">
        </div>

        <!-- USB Camera index input -->
        <div id="usb_index_field" style="display: none;">
            <label for="usb_cam_index">USB Camera Index</label>
            <input type="number" id="usb_cam_index" name="usb_cam_index" min="0">
        </div>

        <!-- Camera adjustment fields (resolution, quality, etc.) -->
        <div id="camera_adjustments" style="display: none;">
            <label for="resolution">Resolution</label>
            <input type="number" id="resolution" name="resolution" min="0" max="13"><br>

            <label for="quality">Quality</label>
            <input type="number" id="quality" name="quality" min="0" max="63"><br>

            <label for="brightness">Brightness</label>
            <input type="number" id="brightness" name="brightness" min="-2" max="2"><br>

            <label for="contrast">Contrast</label>
            <input type="number" id="contrast" name="contrast" min="-2" max="2"><br>

            <label for="saturation">Saturation</label>
            <input type="number" id="saturation" name="saturation" min="-2" max="2"><br>

            <label for="flip">Flip Image</label>
            <select id="flip" name="flip">
                <option value="0">Normal</option>
                <option value="1">Flipped</option>
            </select><br>
        </div>

        <button type="submit">Set Camera</button>
    </form>
</fieldset>

<script>
    function toggleHotspotForm() {
        const hotspotForm = document.getElementById("Hotspot-form");
        const hotspotToggle = document.getElementById("hotspot_toggle");
        if (hotspotToggle.checked) {
            hotspotForm.style.display = "block";
        } else {
            hotspotForm.style.display = "none";
        }
    }

    function toggleCameraFields() {
        const cameraType = document.getElementById("camera_type").value;
        const ipAddressField = document.getElementById("ip_address_field");
        const usbIndexField = document.getElementById("usb_index_field");
        const cameraAdjustments = document.getElementById("camera_adjustments");

        if (cameraType === "esp32") {
            ipAddressField.style.display = "block";
            usbIndexField.style.display = "none";
            cameraAdjustments.style.display = "block";
        } else if (cameraType === "usb") {
            ipAddressField.style.display = "none";
            usbIndexField.style.display = "block";
            cameraAdjustments.style.display = "block";
        } else {
            ipAddressField.style.display = "none";
            usbIndexField.style.display = "none";
            cameraAdjustments.style.display = "none";
        }
    }

    // Initialize fields on page load
    window.onload = toggleCameraFields;
</script>
{% endblock %}
