openapi: 3.0.3
info:
  title: SYSGrow Smart Agriculture API
  description: |
    REST API for the SYSGrow smart agriculture IoT platform.
    
    ## Overview
    SYSGrow provides APIs for:
    - **Devices**: Manage sensors and actuators
    - **Plants**: Track plant lifecycle and health
    - **Growth Units**: Manage growing environments
    - **Analytics**: Access sensor data and trends
    - **ML/AI**: Disease prediction and recommendations
    - **Harvests**: Record and compare grow cycles
    
    ## Authentication
    Most endpoints require authentication via session cookies.
    Use `/auth/login` to obtain a session.
    
    ## Response Format
    All responses follow a standard envelope:
    ```json
    {
      "ok": true,
      "data": { ... },
      "error": null
    }
    ```
    
    ## Rate Limiting
    API requests are rate-limited to 60 requests per minute by default.
    
  version: 1.0.0
  contact:
    name: SYSGrow Team
  license:
    name: MIT

servers:
  - url: http://localhost:5001
    description: Development server
  - url: http://{raspberry_pi_ip}:5001
    description: Raspberry Pi deployment
    variables:
      raspberry_pi_ip:
        default: 192.168.1.100

tags:
  - name: Authentication
    description: User authentication and session management
  - name: Devices
    description: Sensor and actuator management
  - name: Plants
    description: Plant lifecycle and health tracking
  - name: Growth Units
    description: Growing environment management
  - name: Analytics
    description: Sensor analytics and trends
  - name: Harvests
    description: Harvest reports and cycle comparison
  - name: Disease
    description: Disease tracking and prediction
  - name: Health
    description: System health monitoring

paths:
  # ==================== Authentication ====================
  /auth/login:
    post:
      tags: [Authentication]
      summary: User login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                  example: admin
                password:
                  type: string
                  format: password
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          description: Invalid credentials

  # ==================== Devices ====================
  /api/devices/sensors:
    get:
      tags: [Devices]
      summary: List all sensors
      parameters:
        - $ref: '#/components/parameters/UnitIdQuery'
        - $ref: '#/components/parameters/LimitQuery'
        - $ref: '#/components/parameters/OffsetQuery'
      responses:
        '200':
          description: List of sensors
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Sensor'

  /api/devices/sensors/{sensor_id}:
    get:
      tags: [Devices]
      summary: Get sensor details
      parameters:
        - name: sensor_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Sensor details
        '404':
          description: Sensor not found

  /api/devices/actuators:
    get:
      tags: [Devices]
      summary: List all actuators
      parameters:
        - $ref: '#/components/parameters/UnitIdQuery'
      responses:
        '200':
          description: List of actuators

  /api/devices/actuators/{actuator_id}/control:
    post:
      tags: [Devices]
      summary: Control an actuator
      parameters:
        - name: actuator_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                action:
                  type: string
                  enum: [on, off, toggle]
                value:
                  type: number
                  description: Level for dimmable actuators (0-100)
      responses:
        '200':
          description: Control command sent

  # ==================== Plants ====================
  /api/plants:
    get:
      tags: [Plants]
      summary: List all plants
      parameters:
        - $ref: '#/components/parameters/UnitIdQuery'
        - name: stage
          in: query
          schema:
            type: string
            enum: [seedling, vegetative, flowering, fruiting, harvest]
      responses:
        '200':
          description: List of plants

    post:
      tags: [Plants]
      summary: Create a new plant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePlantRequest'
      responses:
        '201':
          description: Plant created

  /api/plants/{plant_id}:
    get:
      tags: [Plants]
      summary: Get plant details
      parameters:
        - name: plant_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Plant details

  # ==================== Disease Tracking ====================
  /api/plants/disease/occurrences:
    post:
      tags: [Disease]
      summary: Record a disease occurrence
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DiseaseOccurrenceRequest'
      responses:
        '201':
          description: Disease occurrence recorded

  /api/plants/disease/history:
    get:
      tags: [Disease]
      summary: Get disease history
      parameters:
        - $ref: '#/components/parameters/UnitIdQuery'
        - name: plant_id
          in: query
          schema:
            type: integer
        - name: disease_type
          in: query
          schema:
            type: string
            enum: [fungal, bacterial, viral, pest, nutrient_deficiency, environmental_stress]
        - name: include_resolved
          in: query
          schema:
            type: boolean
            default: true
      responses:
        '200':
          description: Disease history

  /api/plants/disease/occurrences/{occurrence_id}/resolve:
    put:
      tags: [Disease]
      summary: Mark disease as resolved
      parameters:
        - name: occurrence_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [treatment_applied]
              properties:
                treatment_applied:
                  type: string
                  example: Applied neem oil fungicide
                notes:
                  type: string
      responses:
        '200':
          description: Disease resolved

  # ==================== Growth Units ====================
  /api/growth/units:
    get:
      tags: [Growth Units]
      summary: List growth units
      responses:
        '200':
          description: List of growth units

  /api/growth/units/{unit_id}/vpd:
    get:
      tags: [Growth Units]
      summary: Get VPD status for a unit
      parameters:
        - name: unit_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: VPD status with recommendations

  # ==================== Analytics ====================
  /api/analytics/sensors/{sensor_id}/readings:
    get:
      tags: [Analytics]
      summary: Get sensor readings
      parameters:
        - name: sensor_id
          in: path
          required: true
          schema:
            type: integer
        - name: start_date
          in: query
          schema:
            type: string
            format: date
        - name: end_date
          in: query
          schema:
            type: string
            format: date
        - $ref: '#/components/parameters/LimitQuery'
      responses:
        '200':
          description: Sensor readings

  /api/analytics/dashboard:
    get:
      tags: [Analytics]
      summary: Get dashboard summary
      parameters:
        - $ref: '#/components/parameters/UnitIdQuery'
      responses:
        '200':
          description: Dashboard data

  # ==================== Harvests ====================
  /api/plants/{plant_id}/harvest:
    post:
      tags: [Harvests]
      summary: Record a harvest
      parameters:
        - name: plant_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HarvestRequest'
      responses:
        '200':
          description: Harvest recorded

  /api/harvests:
    get:
      tags: [Harvests]
      summary: List harvest reports
      parameters:
        - $ref: '#/components/parameters/UnitIdQuery'
        - $ref: '#/components/parameters/LimitQuery'
      responses:
        '200':
          description: List of harvest reports

  /api/units/{unit_id}/growth-cycles/compare:
    get:
      tags: [Harvests]
      summary: Compare growth cycles
      description: Compare yields, duration, and conditions across harvests
      parameters:
        - name: unit_id
          in: path
          required: true
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
            maximum: 50
      responses:
        '200':
          description: Growth cycle comparison

  /api/plants/types/{plant_type}/performance:
    get:
      tags: [Harvests]
      summary: Get plant type performance
      description: Historical performance statistics for a plant type
      parameters:
        - name: plant_type
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Performance statistics

  # ==================== Health ====================
  /api/health/system:
    get:
      tags: [Health]
      summary: System health status
      responses:
        '200':
          description: System health information
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [healthy, degraded, critical]
                  database:
                    type: object
                  memory:
                    type: object
                  uptime:
                    type: number

  /api/health/database:
    get:
      tags: [Health]
      summary: Database health and size
      responses:
        '200':
          description: Database health information

components:
  parameters:
    UnitIdQuery:
      name: unit_id
      in: query
      description: Filter by growth unit ID
      schema:
        type: integer

    LimitQuery:
      name: limit
      in: query
      description: Maximum number of results
      schema:
        type: integer
        default: 50
        maximum: 500

    OffsetQuery:
      name: offset
      in: query
      description: Number of results to skip
      schema:
        type: integer
        default: 0

  schemas:
    SuccessResponse:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        data:
          type: object
        error:
          type: object
          nullable: true

    ErrorResponse:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        data:
          type: object
          nullable: true
        error:
          type: object
          properties:
            message:
              type: string

    Sensor:
      type: object
      properties:
        sensor_id:
          type: integer
        name:
          type: string
        sensor_type:
          type: string
        unit_id:
          type: integer
        enabled:
          type: boolean
        last_reading:
          type: object

    CreatePlantRequest:
      type: object
      required: [plant_name, plant_type, unit_id]
      properties:
        plant_name:
          type: string
          example: Tomato Plant 1
        plant_type:
          type: string
          example: tomato
        unit_id:
          type: integer
        current_stage:
          type: string
          enum: [seedling, vegetative, flowering, fruiting]
          default: seedling

    DiseaseOccurrenceRequest:
      type: object
      required: [unit_id, disease_type]
      properties:
        unit_id:
          type: integer
        plant_id:
          type: integer
        disease_type:
          type: string
          enum: [fungal, bacterial, viral, pest, nutrient_deficiency, environmental_stress]
        severity:
          type: string
          enum: [mild, moderate, severe]
          default: mild
        symptoms:
          type: string
        affected_parts:
          type: string
        notes:
          type: string

    HarvestRequest:
      type: object
      required: [harvest_weight_grams]
      properties:
        harvest_weight_grams:
          type: number
          example: 250.5
        quality_rating:
          type: integer
          minimum: 1
          maximum: 5
          default: 3
        notes:
          type: string
        delete_plant_data:
          type: boolean
          default: false
