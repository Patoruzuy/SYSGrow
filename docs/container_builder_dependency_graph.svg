<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="780" viewBox="0 0 1400 780">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4b5563" />
    </marker>
    <style>
      .title { font: 16px Verdana, Arial, sans-serif; fill: #111827; }
      .node-title { font: 13px Verdana, Arial, sans-serif; fill: #111827; font-weight: bold; }
      .node-sub { font: 11px Verdana, Arial, sans-serif; fill: #374151; }
      .node { fill: #f8fafc; stroke: #cbd5f5; stroke-width: 1.5; }
      .node-alt { fill: #f0f9ff; stroke: #93c5fd; stroke-width: 1.5; }
      .node-warn { fill: #fff7ed; stroke: #fdba74; stroke-width: 1.5; }
      .edge { stroke: #4b5563; stroke-width: 1.5; fill: none; marker-end: url(#arrow); }
      .edge-dashed { stroke: #6b7280; stroke-width: 1.3; fill: none; stroke-dasharray: 6 4; marker-end: url(#arrow); }
      .legend { font: 11px Verdana, Arial, sans-serif; fill: #374151; }
    </style>
  </defs>

  <rect x="0" y="0" width="1400" height="780" fill="#ffffff" />
  <text class="title" x="700" y="24" text-anchor="middle">Container Builder Dependency Graph (container_builder.py)</text>

  <!-- Nodes -->
  <rect class="node" x="580" y="40" width="240" height="60" rx="8" />
  <text class="node-title" x="700" y="68" text-anchor="middle">AppConfig</text>
  <text class="node-sub" x="700" y="86" text-anchor="middle">build_* inputs</text>

  <rect class="node-alt" x="80" y="140" width="280" height="80" rx="10" />
  <text class="node-title" x="220" y="176" text-anchor="middle">InfrastructureComponents</text>
  <text class="node-sub" x="220" y="196" text-anchor="middle">database, repos, logging</text>

  <rect class="node-alt" x="430" y="140" width="280" height="80" rx="10" />
  <text class="node-title" x="570" y="176" text-anchor="middle">MQTTComponents</text>
  <text class="node-sub" x="570" y="196" text-anchor="middle">mqtt_client, zigbee_service</text>

  <rect class="node-alt" x="780" y="140" width="280" height="80" rx="10" />
  <text class="node-title" x="920" y="176" text-anchor="middle">SharedUtilities</text>
  <text class="node-sub" x="920" y="196" text-anchor="middle">emitter, processor, event_bus</text>

  <rect class="node" x="80" y="300" width="280" height="80" rx="10" />
  <text class="node-title" x="220" y="336" text-anchor="middle">AIComponents</text>
  <text class="node-sub" x="220" y="356" text-anchor="middle">models, predictors, trainer</text>

  <rect class="node" x="430" y="300" width="280" height="80" rx="10" />
  <text class="node-title" x="570" y="336" text-anchor="middle">HardwareComponents</text>
  <text class="node-sub" x="570" y="356" text-anchor="middle">sensors, actuators, mqtt</text>

  <rect class="node" x="780" y="300" width="280" height="80" rx="10" />
  <text class="node-title" x="920" y="336" text-anchor="middle">ApplicationComponents</text>
  <text class="node-sub" x="920" y="356" text-anchor="middle">growth, plants, health</text>

  <rect class="node-warn" x="80" y="460" width="280" height="80" rx="10" />
  <text class="node-title" x="220" y="496" text-anchor="middle">OptionalAIComponents</text>
  <text class="node-sub" x="220" y="516" text-anchor="middle">monitoring, retraining</text>

  <rect class="node" x="580" y="620" width="240" height="60" rx="8" />
  <text class="node-title" x="700" y="648" text-anchor="middle">ServiceContainer</text>
  <text class="node-sub" x="700" y="666" text-anchor="middle">build() output dict</text>

  <!-- Solid dependency edges (method parameters) -->
  <path class="edge" d="M700 100 L220 140" />
  <path class="edge" d="M700 100 L570 140" />

  <path class="edge" d="M220 220 L220 300" />
  <path class="edge" d="M220 220 L220 460" />
  <path class="edge" d="M220 220 L570 300" />
  <path class="edge" d="M220 220 L920 300" />

  <path class="edge" d="M570 220 L570 300" />
  <path class="edge" d="M570 220 L920 300" />

  <path class="edge" d="M920 220 L570 300" />
  <path class="edge" d="M920 220 L920 300" />

  <path class="edge" d="M220 380 L920 300" />
  <path class="edge" d="M220 380 L220 460" />
  <path class="edge" d="M570 380 L920 300" />

  <!-- Optional AI wiring back into AI components -->
  <path class="edge-dashed" d="M220 540 L220 300" />

  <!-- ServiceContainer aggregation -->
  <path class="edge-dashed" d="M220 540 L700 620" />
  <path class="edge-dashed" d="M220 380 L700 620" />
  <path class="edge-dashed" d="M570 380 L700 620" />
  <path class="edge-dashed" d="M920 380 L700 620" />
  <path class="edge-dashed" d="M220 220 L700 620" />
  <path class="edge-dashed" d="M570 220 L700 620" />
  <path class="edge-dashed" d="M920 220 L700 620" />

  <!-- Legend -->
  <rect x="1020" y="520" width="300" height="190" fill="#f9fafb" stroke="#e5e7eb" rx="8" />
  <text class="legend" x="1040" y="545">Legend</text>
  <line class="edge" x1="1040" y1="565" x2="1100" y2="565" />
  <text class="legend" x="1110" y="569">Build method dependency</text>
  <line class="edge-dashed" x1="1040" y1="592" x2="1100" y2="592" />
  <text class="legend" x="1110" y="596">Wiring or aggregation</text>
  <text class="legend" x="1040" y="625">Notes:</text>
  <text class="legend" x="1040" y="642">- NotificationsService emitter wired from SharedUtilities</text>
  <text class="legend" x="1040" y="658">- Irrigation workflow gets actuator manager + scheduler</text>
  <text class="legend" x="1040" y="674">- ThresholdService wired into PlantHealthMonitor</text>
  <text class="legend" x="1040" y="690">- AppConfig also feeds AI/Hardware/Application settings</text>
</svg>
