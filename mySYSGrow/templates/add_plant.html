{% extends 'base.html' %}

{% block content %}
<h1>Link Soil Moisture Sensor</h1>
<form id="link-sensor-form" method="POST" action="{{ url_for('link_sensor') }}">
    <label for="plant_id">Select Plant:</label>
    <select id="plant_id" name="plant_id">
        {% for plant in plants %}
        <option value="{{ plant.id }}">{{ plant.name }}</option>
        {% endfor %}
    </select>
    <label for="sensor_id">Select Soil Moisture Sensor:</label>
    <select id="sensor_id" name="sensor_id">
        {% for sensor in sensors %}
        <option value="{{ sensor.sensor_id }}">{{ sensor.sensor_type }}</option>
        {% endfor %}
    </select>
    <button type="submit">Link Sensor</button>
</form>

<h1>Add Plant</h1>
<form method="post" action="{{ url_for('add_plant') }}">
    <label for="plant_type">Plant Name:</label>
    <input type="text" id="plant_type" name="plant_type" required>
    <label for="plant_stage">Plant stage:</label>
    <select id="plant_stage" name="plant_stage">
        <option value="seedling">Seedling</option>
        <option value="vegetative">Vegetative</option>
        <option value="flowering">Flowering</option>
    </select>
    <button type="submit">Add Plant</button>
</form>

<h1>Set Stage Durations</h1>
<form method="post" action="{{ url_for('set_stage_durations') }}">
    <label for="plant_name">Plant Name:</label>
    <select id="plant_name" name="plant_name" required>
        {% for plant in plants %}
        <option value="{{ plant.id }}">{{ plant.name }}</option>
        {% endfor %}
    </select>
    <label for="seed_days">Days in Seed Stage:</label>
    <input type="number" id="seed_days" name="seed_days" min="1" required>
    <label for="grow_days">Days in Grow Stage:</label>
    <input type="number" id="grow_days" name="grow_days" min="1" required>
    <label for="flowering_days">Days in Flowering Stage:</label>
    <input type="number" id="flowering_days" name="flowering_days" min="1" required>
    <button type="submit">Set Durations</button>
</form>
{% endblock %}
