{% extends 'base.html' %}

{% block content %}
<h1>Add Plant</h1>
<form method="post" action="{{ url_for('add_plant') }}">
    <label for="plant_type">Plant Type:</label>
    <input type="text" id="plant_type" name="plant_type" required>
    <label for="plant_stage">Plant stage:</label>
    <select id="plant_stage" name="plant_stage">
        <option value="seedling">Seedling</option>
        <option value="vegetative">Vegetative</option>
        <option value="flowering">Flowering</option>
    </select>
    <input type="text" id="plant_stage" name="plant_stage" required>
    <button type="submit">Add Plant</button>
</form>
{% endblock %}
