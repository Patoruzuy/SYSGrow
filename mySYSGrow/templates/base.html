<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="author" content="Sebastian Gomez" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYSGrow</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <header name="base_header">
        <div class="site-logo" tabindex="1">
            <img src="/static/images/logo.jpg" class="logo-image" alt="SYSGrow logo">
            <div class="logo-text">
                <h1 class="heading">Grow Tent Management</h1>
                <p class="subtitle">From seed to harvest</p>
            </div>
        </div>
    </header>
    <nav>
        <ul>
            <li><a href="{{ url_for('index') }}">Home</a></li>
            <li><a href="{{ url_for('add_plant') }}">Add Plant</a></li>
            <li><a href="{{ url_for('sensor_data') }}">Sensor Data</a></li>
            <li><a href="{{ url_for('sensor_data_graph') }}">Sensor Data Graph</a></li>
        </ul>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    <script src="{{ url_for('static', filename='js/scripts.js') }}"></script>
</body>
</html>
