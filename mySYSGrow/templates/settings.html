{% extends 'base.html' %}

{% block content %}
<h1>Device Settings</h1>
<form id="settings-form" method="POST">
    <input type="hidden" id="device_count" name="device_count" value="{{ devices|length + 1 }}">
    <div id="new-device-container">
        <div class="device">
            <label for="device_name_1">Device Name:</label>
            <input type="text" id="device_name_1" name="device_name_1">
            <label for="device_gpio_1">GPIO:</label>
            <input type="text" id="device_gpio_1" name="device_gpio_1">
            <label for="device_ip_1">IP Address:</label>
            <input type="text" id="device_ip_1" name="device_ip_1">
            <label for="device_functionality_1">Functionality:</label>
            <select id="device_functionality_1" name="device_functionality_1">
                <option value="light">Light</option>
                <option value="temperature">Temperature Control</option>
                <option value="humidity">Humidity Control</option>
                <option value="soil_moisture">Soil Moisture</option>
            </select>
            <button type="button" onclick="testDevice('device_functionality_1', 1)">Test Device</button>
            <span id="test_result_1"></span>
        </div>
    </div>
    <button type="button" onclick="addDeviceAndSubmit()">Add Device</button>
    <input type="submit" value="Save" id="save-button" style="display: none;">
</form>

<h1>Devices</h1>
<table>
    <thead>
        <tr>
            <th>ID</th>
            <th>Device Name</th>
            <th>GPIO</th>
            <th>IP Address</th>
            <th>Functionality</th>
        </tr>
    </thead>
    <tbody>
        {% for device in devices %}
        <tr>
            <td>{{ loop.index }}</td>
            <td>{{ device.name }}</td>
            <td>{{ device.gpio }}</td>
            <td>{{ device.ip_address }}</td>
            <td>{{ device.functionality }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>

<h2>Threshold Settings</h2>
<form method="post" action="{{ url_for('set_thresholds') }}">
    <label for="temperature_threshold">Temperature Threshold (°C):</label>
    <input type="number" id="temperature_threshold" name="temperature_threshold" step="0.1" required>
    <label for="humidity_threshold">Humidity Threshold (%):</label>
    <input type="number" id="humidity_threshold" name="humidity_threshold" step="0.1" required>
    <label for="soil_moisture_threshold">Soil Moisture Threshold:</label>
    <input type="number" id="soil_moisture_threshold" name="soil_moisture_threshold" step="0.1" required>
    <button type="submit">Set Thresholds</button>
</form>

{% endblock %}
