{% extends 'base.html' %}

{% block content %}
<h1>Device Settings</h1>
<form id="settings-form" method="POST">
    <input type="hidden" id="device_count" name="device_count" value="{{ devices|length }}">
    <div id="devices-container">
        {% for device in devices %}
        <div class="device">
            <label for="device_name_{{ loop.index }}">Device Name:</label>
            <input type="text" id="device_name_{{ loop.index }}" name="device_name_{{ loop.index }}" value="{{ device.name }}">
            <label for="device_gpio_{{ loop.index }}">GPIO:</label>
            <input type="text" id="device_gpio_{{ loop.index }}" name="device_gpio_{{ loop.index }}" value="{{ device.gpio }}">
            <label for="device_ip_{{ loop.index }}">IP Address:</label>
            <input type="text" id="device_ip_{{ loop.index }}" name="device_ip_{{ loop.index }}" value="{{ device.ip_address }}">
            <label for="device_functionality_{{ loop.index }}">Functionality:</label>
            <select id="device_functionality_{{ loop.index }}" name="device_functionality_{{ loop.index }}">
                <option value="light" {% if device.functionality == "light" %}selected{% endif %}>Light</option>
                <option value="temperature_control" {% if device.functionality == "temperature_control" %}selected{% endif %}>Temperature Control</option>
                <option value="humidity_control" {% if device.functionality == "humidity_control" %}selected{% endif %}>Humidity Control</option>
            </select>
        </div>
        {% endfor %}
    </div>
    <button type="button" onclick="addDevice()">Add Device</button>
    <input type="submit" value="Save">
</form>

{% endblock %}
